name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libx11-dev libasound2-dev libudev-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare Package
        shell: bash
        run: |
          mkdir -p release
          cp -r assets release/
          [ -f LICENSE ] && cp LICENSE release/
          [ -f README.md ] && cp README.md release/
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp target/${{ matrix.target }}/release/steering${{ matrix.suffix }} release/
            cd release && 7z a ../steering-${{ github.ref_name }}-${{ matrix.target }}.zip *
          else
            cp target/${{ matrix.target }}/release/steering${{ matrix.suffix }} release/
            cd release && tar -czvhf ../steering-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *
          fi

      - name: Release
        uses: softprop/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            steering-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            steering-${{ github.ref_name }}-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
